<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team select</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
<a href="manager_custom[3].html"><button class="back-btn"><b>Back</b><i class='bx bx-arrow-back'></i></button></a>

<div class="team-select">

  <!-- TOP -->
  <div class="top-bar">
    <p id="country-name">LOADING...</p>
    <div class="topselector">
        <button id="topleft">&#9664;</button>
        <img id="country-flag" src="img/e">
        <button id="topright">&#9654;</button>
    </div>

    
  </div>

  <!-- MIDDLE -->
  <div class="selector-box">
    <h1 id="team-name">LOADING...</h1>

    <div class="selector">
      <button id="left-btn">&#9664;</button>
      <img id="team-crest" src="img/">
      <button id="right-btn">&#9654;</button>
    </div>

    <div class="stars" id="team-stars">★★★★★</div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">
    <p id="league-name">LOADING...</p>
    <div class="bottomselector">
        <button id="bottomleft">&#9664;</button>
        <img id="league-logo" src="img/">
        <button id="bottomright">&#9654;</button>
    </div>
  </div>

</div>

</body>
</html>
